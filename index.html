<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben Decocasa - 3D Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #fff; margin-bottom: 20px; }
        #viewer {
            width: 100%;
            max-width: 800px;
            height: 500px;
            background: #0d0d15;
            border-radius: 12px;
        }
        .colors {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
        }
        .color-btn:hover { transform: scale(1.1); }
        .color-btn.active { border-color: #fff; }
    </style>
</head>
<body>
    <h1>Ben Decocasa 3D</h1>
    <div id="viewer"></div>
    <div class="colors">
        <button class="color-btn active" style="background:#C0C0C0" data-color="0xC0C0C0"></button>
        <button class="color-btn" style="background:#1a1a1a" data-color="0x1a1a1a"></button>
        <button class="color-btn" style="background:#FFD700" data-color="0xFFD700"></button>
        <button class="color-btn" style="background:#CD7F32" data-color="0xCD7F32"></button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        const container = document.getElementById('viewer');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0d0d15);
        
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 1000);
        camera.position.set(0, 0.5, 2);
        
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);
        
        const light1 = new THREE.DirectionalLight(0xffffff, 1);
        light1.position.set(5, 5, 5);
        scene.add(light1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        
        let materials = [];
        const loader = new THREE.GLTFLoader();
        loader.load('base_basic_pbr.glb', (gltf) => {
            const model = gltf.scene;
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            model.position.sub(center);
            model.scale.setScalar(1.5 / Math.max(size.x, size.y, size.z));
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.material = new THREE.MeshStandardMaterial({
                        color: 0xC0C0C0,
                        metalness: 1,
                        roughness: 0.3
                    });
                    materials.push(child.material);
                }
            });
            scene.add(model);
        });
        
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const color = parseInt(btn.dataset.color);
                materials.forEach(m => m.color.setHex(color));
            };
        });
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
